<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galeri Desa Tlogo</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<header class="header">

    <div class="header-title">
        DESA TLOGO
    </div>

    <div class="header-logos">
        <img src="assets/logo-desa.jpg" class="logo-img" alt="Logo Desa">
        <img src="assets/logo-klaten.jpg" class="logo-img" alt="Logo Klaten">
    </div>

    <ul class="menu">
        <li><a href="index.html">Beranda</a></li>
        <li><a href="profil.html">Profil</a></li>
        <li><a href="kegiatan.html">Kegiatan</a></li>
        <li><a href="galeri.html">Galeri</a></li>
        <li><a href="kontak.html">Kontak</a></li>
    </ul>

</header>

<!-- ================= HERO ================= -->

<section class="page-hero">

    <div class="page-overlay"></div>

    <div class="page-content">

        <h1>Galeri Desa</h1>

        <p>
            Dokumentasi kegiatan dan suasana Desa Tlogo.
        </p>

    </div>

</section>

<!-- ================= GALERI ================= -->

<section class="section">

    <h2 class="section-title">
        Dokumentasi Desa Tlogo
    </h2>

    <div class="gallery-premium">

        <div class="gallery-item">
            <img src="assets/galeri1.jpg" alt="Galeri 1" onclick="openImage(this.src)">
        </div>

        <div class="gallery-item">
            <img src="assets/galeri2.jpg" alt="Galeri 2" onclick="openImage(this.src)">
        </div>

        <div class="gallery-item">
            <img src="assets/galeri3.jpg" alt="Galeri 3" onclick="openImage(this.src)">
        </div>

        <div class="gallery-item">
            <img src="assets/galeri4.jpg" alt="Galeri 4" onclick="openImage(this.src)">
        </div>

        <div class="gallery-item">
            <img src="assets/galeri5.jpg" alt="Galeri 5" onclick="openImage(this.src)">
        </div>

    </div>

</section>

<!-- ================= LIGHTBOX ================= -->

<div id="lightbox" class="lightbox">

    <span class="close-btn" onclick="closeImage()">&times;</span>

    <img id="lightbox-img" src="" alt="Preview">

</div>

<!-- ================= FOOTER ================= -->

<footer class="footer">

    <h3>DESA TLOGO</h3>

    <p>
        Kecamatan Prambanan, Kabupaten Klaten
    </p>

    <p>
        © 2026 Desa Tlogo. All Rights Reserved.
    </p>

</footer>

<!-- ================= SCRIPT ================= -->

<script>

function openImage(src){

    document.getElementById("lightbox").style.display = "flex";

    document.getElementById("lightbox-img").src = src;

}

function closeImage(){

    document.getElementById("lightbox").style.display = "none";

}

window.addEventListener("keydown", function(e){

    if(e.key === "Escape"){

        closeImage();

    }

});

</script>

</body>
</html>
